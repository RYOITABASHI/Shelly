name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Download codex-termux Android binary
        run: |
          CODEX_TERMUX_VERSION="v0.121.0-termux"
          JNILIBS="modules/terminal-emulator/android/src/main/jniLibs/arm64-v8a"
          curl -L "https://github.com/DioNanos/codex-termux/releases/download/${CODEX_TERMUX_VERSION}/codex-termux-android-arm64-${CODEX_TERMUX_VERSION}.tar.gz" \
            -o /tmp/codex-termux.tar.gz
          cd /tmp && tar xzf codex-termux.tar.gz
          cp /tmp/codex-exec.bin "${GITHUB_WORKSPACE}/${JNILIBS}/libcodex_exec.so"
          chmod 755 "${GITHUB_WORKSPACE}/${JNILIBS}/libcodex_exec.so"
          ls -lh "${GITHUB_WORKSPACE}/${JNILIBS}/libcodex_exec.so"

      - name: Bundle AI CLIs (Claude Code, Gemini CLI, Codex)
        run: |
          mkdir -p cli-bundle
          # Install CLIs with arm64 target (device is aarch64, CI is x86_64)
          npm install -g --prefix ./cli-bundle --cpu=arm64 --os=linux \
            @anthropic-ai/claude-code @google/gemini-cli @openai/codex
          # Patch clipboardy: remove Termux guard so Gemini CLI starts without Termux
          # The check may be in clipboardy hoisted to various locations or bundled in chunks
          find cli-bundle/lib -name "*.js" -exec grep -l "TERMUX_VERSION" {} \; | while read f; do
            sed -i "s|process.env.TERMUX_VERSION===void 0|false|g" "$f"
            sed -i "s|process.env.TERMUX_VERSION === undefined|false|g" "$f"
            echo "Patched TERMUX_VERSION in: $f"
          done
          # Tar them up for APK assets (LibExtractor will extract on first launch)
          cd cli-bundle/lib
          tar czf ../../modules/terminal-emulator/android/src/main/assets/cli-tools.tar.gz node_modules
          cd ../..
          ls -lh modules/terminal-emulator/android/src/main/assets/cli-tools.tar.gz

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease -x lintVitalAnalyzeRelease
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shelly-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Publish EAS Update (OTA)
        run: eas update --platform android --branch preview --message "${MSG:-manual build}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          MSG: ${{ github.event.head_commit.message }}
