name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Nightly rebuild to pick up @anthropic-ai/claude-code-linux-arm64-musl@latest
  # releases (bug #117 Path C-bis auto-follow). If Anthropic ships a new
  # version between 00:00 UTC runs, the next push or manual dispatch also
  # picks it up.
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set up QEMU (for Alpine aarch64 musl build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build patched musl libc for claude-code 2.1.113+ (bug #117 Path C-bis)
        # Natively compile musl v1.2.4 inside an aarch64 Alpine container
        # (emulated via qemu-user-static) with the hardcoded
        # /etc/resolv.conf path rewritten to Shelly's app-writable home.
        # bionic has no /etc/resolv.conf (it uses net.dns* properties),
        # and LD_PRELOAD can't intercept musl's inline syscalls — so we
        # bake the path in at build time. Alpine 3.19 ships musl 1.2.4;
        # pinning the source tag keeps ABI compatibility with the
        # claude-code-linux-arm64-musl prebuilt.
        #
        # A cross-compile via musl.cc used to live here, but musl.cc was
        # unreachable from GitHub-hosted runners (connect timeout) in
        # initial CI trials. Native-in-qemu is ~3× slower (~5 min vs
        # ~90 s) but removes the third-party hosting dependency.
        #
        # Proof-of-concept verified on Termux/Galaxy Z Fold6 (2026-04-21):
        # `./ld-musl-aarch64.so.1 ./claude --print ...` round-trips
        # api.anthropic.com successfully. See DEFERRED.md bug #117.
        run: |
          JNILIBS="modules/terminal-emulator/android/src/main/jniLibs/arm64-v8a"
          RESOLV_CONF_PATH="/data/user/0/dev.shelly.terminal/files/home/.shelly-ssl/resolv.conf"

          mkdir -p /tmp/musl-out
          curl -fsSL --retry 3 --retry-delay 5 \
            https://github.com/ifduyue/musl/archive/refs/tags/v1.2.4.tar.gz \
            -o /tmp/musl-v1.2.4.tar.gz
          CID="$(docker create --platform linux/arm64 \
            -v /tmp/musl-out:/out \
            -e RESOLV_CONF_PATH="${RESOLV_CONF_PATH}" \
            alpine:3.19 sh -euxc '
              apk add --no-progress build-base
              cd /tmp
              mkdir musl
              tar xzf /tmp/musl-v1.2.4.tar.gz -C musl --strip-components=1
              cd musl
              # We tried macro-based -DMUSL_RESOLV_CONF_PATH during PoC —
              # does not survive the shell→make→shell round-trip because
              # make re-invokes /bin/sh which strips the quoted literal.
              # Direct sed of the string literal in src/network/resolvconf.c
              # is foolproof.
              sed -i "s|\"/etc/resolv.conf\"|\"${RESOLV_CONF_PATH}\"|g" src/network/resolvconf.c
              grep -q "${RESOLV_CONF_PATH}" src/network/resolvconf.c
              ./configure --prefix=/tmp/musl-out >/tmp/configure.log 2>&1 || { tail -30 /tmp/configure.log; exit 1; }
              make -j"$(nproc)" >/tmp/make.log 2>&1 || { tail -30 /tmp/make.log; exit 1; }
              make install >/tmp/install.log 2>&1 || { tail -30 /tmp/install.log; exit 1; }
              strip --strip-unneeded lib/libc.so
              cp lib/libc.so /out/libld_musl_shelly.so
              # This container itself is Alpine/aarch64, so system gcc is
              # already a musl 1.2.4 compiler. The wrapper does not need
              # Shelly patched resolver path, only musl ABI compatibility
              # with the loader used for Claude Code.
              gcc -shared -fPIC -O2 -Wall -Wextra -Werror \
                /tmp/exec-wrapper.c \
                -o /out/libexec_wrapper_musl.so -ldl
              strip --strip-unneeded /out/libexec_wrapper_musl.so
              # Sanity checks inside the container — readelf/strings are
              # the Alpine aarch64 natives, no cross-tool needed.
              readelf -h /out/libld_musl_shelly.so | grep -E "Type|Machine"
              strings /out/libld_musl_shelly.so | grep -q "${RESOLV_CONF_PATH}" && echo "[musl] resolv.conf path baked in ✓"
              readelf -h /out/libexec_wrapper_musl.so | grep -E "Type|Machine"
              readelf -d /out/libexec_wrapper_musl.so | grep -E "Shared library: \\[(libc\\.so|libc\\.musl-aarch64\\.so\\.1)\\]"
            ')"
          trap 'docker rm -f "${CID}" >/dev/null 2>&1 || true' EXIT
          docker cp /tmp/musl-v1.2.4.tar.gz "${CID}:/tmp/musl-v1.2.4.tar.gz"
          docker cp "${GITHUB_WORKSPACE}/modules/terminal-emulator/android/src/main/jni/exec-wrapper.c" "${CID}:/tmp/exec-wrapper.c"
          docker start -a "${CID}"
          docker rm "${CID}" >/dev/null
          trap - EXIT
          cp /tmp/musl-out/libld_musl_shelly.so "${GITHUB_WORKSPACE}/${JNILIBS}/libld_musl_shelly.so"
          cp /tmp/musl-out/libexec_wrapper_musl.so "${GITHUB_WORKSPACE}/${JNILIBS}/libexec_wrapper_musl.so"
          chmod 755 "${GITHUB_WORKSPACE}/${JNILIBS}/libld_musl_shelly.so"
          chmod 755 "${GITHUB_WORKSPACE}/${JNILIBS}/libexec_wrapper_musl.so"
          ls -lh "${GITHUB_WORKSPACE}/${JNILIBS}/libld_musl_shelly.so" "${GITHUB_WORKSPACE}/${JNILIBS}/libexec_wrapper_musl.so"
          file "${GITHUB_WORKSPACE}/${JNILIBS}/libld_musl_shelly.so"
          file "${GITHUB_WORKSPACE}/${JNILIBS}/libexec_wrapper_musl.so"

      - name: Install aarch64 cross-binutils (for strip --strip-unneeded)
        # bug #139 (2026-04-27): the next step strips Termux .deb extracts
        # to remove debug+local symbols (~25-35 MB total APK savings).
        # Ubuntu-latest's system `strip` is x86_64-only and rejects
        # aarch64 ELFs. binutils-aarch64-linux-gnu provides
        # `aarch64-linux-gnu-strip` which handles aarch64 ELFs cross-arch.
        # We can't use NDK's llvm-strip here because Setup Android SDK
        # runs much later in this workflow.
        run: sudo apt-get install -y --no-install-recommends binutils-aarch64-linux-gnu

      - name: Bundle Termux extras (git-remote-https, ssh-keygen) — bug #128
        # Shelly bundles `git` itself but not the git-remote-https helper that
        # makes `git clone https://...` work, nor `ssh-keygen` for SSH key
        # generation. Without these, Shelly-on-Shelly development is
        # structurally blocked — every `git clone https://...` returns
        # "fatal: remote helper 'https' aborted session". User report
        # 2026-04-27.
        #
        # We pull the binaries from Termux's stable apt repo. Latest .deb
        # is resolved dynamically from the Packages.xz index so we follow
        # upstream automatically.
        run: |
          JNILIBS="modules/terminal-emulator/android/src/main/jniLibs/arm64-v8a"
          REPO_BASE="https://packages-cf.termux.dev/apt/termux-main"

          # Fetch the Termux apt index. The mirror at
          # packages-cf.termux.dev historically served Packages.xz, but as of
          # 2026-04-27 only the uncompressed Packages and Packages.gz are
          # reliably present. Try in preference order: .xz → .gz →
          # uncompressed. The build CI runner has xz-utils + gzip pre-
          # installed; only the uncompressed fallback would also work
          # without decoders, so it's the safety net.
          fetch_packages_index() {
            local url="$1" decoder="$2"
            if [ -n "$decoder" ]; then
              curl -fsSL "$url" | $decoder > /tmp/Packages.tmp 2>/dev/null \
                && [ -s /tmp/Packages.tmp ] \
                && mv /tmp/Packages.tmp /tmp/Packages \
                && return 0
            else
              curl -fsSL "$url" -o /tmp/Packages.tmp 2>/dev/null \
                && [ -s /tmp/Packages.tmp ] \
                && mv /tmp/Packages.tmp /tmp/Packages \
                && return 0
            fi
            rm -f /tmp/Packages.tmp
            return 1
          }
          IDX_BASE="${REPO_BASE}/dists/stable/main/binary-aarch64"
          if   fetch_packages_index "${IDX_BASE}/Packages.xz" "xz -d"; then
            echo "[termux-extras] index source: Packages.xz"
          elif fetch_packages_index "${IDX_BASE}/Packages.gz" "gzip -d"; then
            echo "[termux-extras] index source: Packages.gz"
          elif fetch_packages_index "${IDX_BASE}/Packages" ""; then
            echo "[termux-extras] index source: Packages (uncompressed)"
          else
            echo "FATAL: could not fetch Termux Packages index from ${IDX_BASE}" >&2
            exit 1
          fi
          test -s /tmp/Packages || { echo "FATAL: empty Packages index"; exit 1; }
          echo "[termux-extras] index size: $(wc -c < /tmp/Packages) bytes"

          # Filename helper (paragraph-mode awk lookup)
          find_filename() {
            awk -v pkg="$1" -v RS= '
              /^Package:/ {
                for (i = 1; i <= NF; i++) {
                  if ($i == "Package:" && $(i+1) == pkg) {
                    matched = 1
                  }
                }
              }
              matched && /Filename:/ {
                for (i = 1; i <= NF; i++) {
                  if ($i == "Filename:") {
                    print $(i+1)
                    exit
                  }
                }
              }
            ' /tmp/Packages
          }

          # Extract a Termux .deb's payload to a directory.
          extract_deb() {
            local deb="$1" outdir="$2"
            mkdir -p "$outdir"
            (cd "$outdir" && ar x "$deb")
            if [ -f "$outdir/data.tar.xz" ]; then
              tar -xf "$outdir/data.tar.xz" -C "$outdir"
            elif [ -f "$outdir/data.tar.zst" ]; then
              zstd -d "$outdir/data.tar.zst" -o "$outdir/data.tar"
              tar -xf "$outdir/data.tar" -C "$outdir"
            elif [ -f "$outdir/data.tar.gz" ]; then
              tar -xzf "$outdir/data.tar.gz" -C "$outdir"
            else
              echo "FATAL: unknown payload format in $deb"; ls -la "$outdir"; exit 1
            fi
          }

          # 1. git-remote-https (and -http for non-TLS) from `git` package
          GIT_FILENAME=$(find_filename git)
          [ -n "$GIT_FILENAME" ] || { echo "FATAL: git package not found in Packages index"; exit 1; }
          echo "[termux-extras] git: ${GIT_FILENAME}"
          curl -fsSL "${REPO_BASE}/${GIT_FILENAME}" -o /tmp/git.deb
          extract_deb /tmp/git.deb /tmp/git-pkg
          for helper in git-remote-https git-remote-http; do
            src="/tmp/git-pkg/data/data/com.termux/files/usr/libexec/git-core/${helper}"
            dst="${GITHUB_WORKSPACE}/${JNILIBS}/lib${helper//-/_}.so"
            if [ ! -f "$src" ]; then
              echo "FATAL: ${helper} not found in git package at $src"
              find /tmp/git-pkg/data/data/com.termux/files/usr/libexec -name 'git-remote-*' || true
              exit 1
            fi
            cp "$src" "$dst"
            chmod 755 "$dst"
            # bug #139 (2026-04-27): strip Termux .deb extracts. Termux's
            # apt mirror sometimes ships unstripped binaries (esp. the
            # gpg cascade — gh as a Go binary saves 15+ MB stripped).
            # --strip-unneeded preserves DT_NEEDED + dynamic symbols
            # required for runtime resolution; only debug + local symbols
            # are removed. NDK clang's llvm-strip is ABI-aware for
            # aarch64. Failure is non-fatal (already-stripped binaries
            # warn but the file remains usable).
            aarch64-linux-gnu-strip --strip-unneeded "$dst" 2>/dev/null || true
            echo "[termux-extras] bundled ${helper} → $(basename "$dst") ($(stat -c %s "$dst") bytes)"
          done

          # 2. ssh-keygen from `openssh` package
          SSH_FILENAME=$(find_filename openssh)
          [ -n "$SSH_FILENAME" ] || { echo "FATAL: openssh package not found in Packages index"; exit 1; }
          echo "[termux-extras] openssh: ${SSH_FILENAME}"
          curl -fsSL "${REPO_BASE}/${SSH_FILENAME}" -o /tmp/openssh.deb
          extract_deb /tmp/openssh.deb /tmp/openssh-pkg
          src="/tmp/openssh-pkg/data/data/com.termux/files/usr/bin/ssh-keygen"
          dst="${GITHUB_WORKSPACE}/${JNILIBS}/libssh_keygen.so"
          if [ ! -f "$src" ]; then
            echo "FATAL: ssh-keygen not found in openssh package at $src"
            find /tmp/openssh-pkg/data/data/com.termux/files/usr/bin -name 'ssh*' || true
            exit 1
          fi
          cp "$src" "$dst"
          chmod 755 "$dst"
          aarch64-linux-gnu-strip --strip-unneeded "$dst" 2>/dev/null || true
          echo "[termux-extras] bundled ssh-keygen → $(basename "$dst") ($(stat -c %s "$dst") bytes)"

          # bug #130 (2026-04-27): Tier-1 dev essentials. Same Termux apt
          # mirror, same extract pattern. These are the binaries Claude
          # Code / Codex routinely complain about ("gh: command not
          # found", "gpg: not found", "unzip: not found") during
          # Shelly-on-Shelly dev. git-credential-* come from the git
          # package we already extracted in step 1.
          #
          # Each entry: <pkg>:<bin-name>:<src-path-after-/usr>:<dst-name>
          # When pkg is "_git_extracted" we reuse the already-extracted
          # /tmp/git-pkg payload to avoid re-downloading. When pkg is
          # "_openssh_extracted" we reuse /tmp/openssh-pkg.
          while IFS=: read -r pkg src_subpath dst_name; do
            [ -z "$pkg" ] && continue
            case "$pkg" in
              \#*) continue ;;
            esac
            case "$pkg" in
              _git_extracted)
                pkg_dir="/tmp/git-pkg"
                ;;
              _openssh_extracted)
                pkg_dir="/tmp/openssh-pkg"
                ;;
              *)
                pkg_filename=$(find_filename "$pkg")
                if [ -z "$pkg_filename" ]; then
                  echo "[termux-extras] WARN: ${pkg} package not in index, skipping"
                  continue
                fi
                echo "[termux-extras] ${pkg}: ${pkg_filename}"
                pkg_dir="/tmp/${pkg}-pkg"
                rm -rf "$pkg_dir"
                curl -fsSL "${REPO_BASE}/${pkg_filename}" -o "/tmp/${pkg}.deb"
                extract_deb "/tmp/${pkg}.deb" "$pkg_dir"
                ;;
            esac
            src="${pkg_dir}/data/data/com.termux/files/usr/${src_subpath}"
            dst="${GITHUB_WORKSPACE}/${JNILIBS}/${dst_name}"
            if [ ! -f "$src" ]; then
              echo "[termux-extras] WARN: ${dst_name} source missing at ${src}, skipping"
              continue
            fi
            cp "$src" "$dst"
            chmod 755 "$dst"
            aarch64-linux-gnu-strip --strip-unneeded "$dst" 2>/dev/null || true
            echo "[termux-extras] bundled ${dst_name} (from ${pkg}/${src_subpath}, $(stat -c %s "$dst") bytes)"
          done <<'EOF'
          gh:bin/gh:libgh.so
          gnupg:bin/gpg:libgpg.so
          gnupg:bin/gpg-agent:libgpg_agent.so
          nano:bin/nano:libnano.so
          unzip:bin/unzip:libunzip.so
          _git_extracted:libexec/git-core/git-credential-store:libgit_credential_store.so
          _git_extracted:libexec/git-core/git-credential-cache:libgit_credential_cache.so
          # bug #132 (2026-04-27): gpg + unzip both DT_NEEDED libbz2.so.1.0
          # but Shelly never bundled it. On-device repro: "CANNOT LINK
          # EXECUTABLE: library libbz2.so.1.0 not found". Pull from
          # Termux's libbz2 package, name as libbz2_1.so in apk lib/
          # (gradle apkPackager only accepts lib*.so without version
          # suffix), LibExtractor renames to libbz2.so.1.0 on disk
          # which is what gpg/unzip's DT_NEEDED references.
          libbz2:lib/libbz2.so.1.0:libbz2_1.so
          # bug #135 (2026-04-27, agent-reviewed): gpg's runtime dep
          # cascade. UNLIKE libbz2 (#132) which ships versioned
          # libbz2.so.1.0, Termux ships these libs UNVERSIONED — the
          # .deb has a single `usr/lib/libNAME.so` file with no
          # symlinks, and gpg's DT_NEEDED references match (e.g.
          # `libgcrypt.so` not `libgcrypt.so.20`). Verified against
          # current debs:
          #   libgcrypt_1.11.2-1, libgpg-error_1.58, libassuan_3.0.2-1,
          #   libksba_1.6.8, libnpth_1.6-3
          # Verified gpg's DT_NEEDED:
          #   libz.so.1, libbz2.so.1.0, libsqlite3.so, libgcrypt.so,
          #   libreadline.so.8, libassuan.so, libnpth.so, libgpg-error.so
          # Apk lib/ filenames use underscores instead of hyphens
          # (gradle compatibility); LibExtractor renames to the
          # hyphenated SONAMEs on disk where DT_NEEDED resolves.
          libgcrypt:lib/libgcrypt.so:libgcrypt.so
          libgpg-error:lib/libgpg-error.so:libgpg_error.so
          libassuan:lib/libassuan.so:libassuan.so
          libksba:lib/libksba.so:libksba.so
          libnpth:lib/libnpth.so:libnpth.so
          EOF

          # Verify the critical landings (T1 graceful — WARN not FATAL).
          # bug #135 review (2026-04-27): expanded to include libbz2 +
          # gpg cascade so future Termux upstream renames trigger an
          # immediate "MISSING:" line in CI logs instead of an apparently
          # green build that ships a broken APK.
          echo "[termux-extras] === landed files ==="
          for f in libgit_remote_https.so libgit_remote_http.so libssh_keygen.so \
                   libgh.so libgpg.so libgpg_agent.so libnano.so libunzip.so \
                   libgit_credential_store.so libgit_credential_cache.so \
                   libbz2_1.so \
                   libgcrypt.so libgpg_error.so libassuan.so libksba.so libnpth.so; do
            if [ -f "${GITHUB_WORKSPACE}/${JNILIBS}/$f" ]; then
              ls -lh "${GITHUB_WORKSPACE}/${JNILIBS}/$f"
            else
              echo "  MISSING: $f"
            fi
          done

      - name: Bundle claude-code musl binary (bug #117 Path C-bis)
        # claude-code 2.1.113+ ships as a Bun SEA (Single Executable
        # Application) — a statically linked ~220 MB ET_EXEC binary that
        # can't be exec'd directly on Android bionic (unexpected e_type: 2
        # from /system/bin/linker64). We pair it with the Shelly-patched
        # ld-musl-aarch64.so.1 from the previous step so bionic can exec
        # the DYN loader, which in turn mmaps and runs the ET_EXEC claude.
        #
        # @latest is intentional — CI runs per-commit and nightly
        # (scheduled below), so Shelly users get the newest claude-code
        # within 24 h of an Anthropic release without any runtime download.
        run: |
          JNILIBS="modules/terminal-emulator/android/src/main/jniLibs/arm64-v8a"
          cd /tmp
          npm pack @anthropic-ai/claude-code-linux-arm64-musl@latest
          tar xzf anthropic-ai-claude-code-linux-arm64-musl-*.tgz
          test -f package/claude || { echo "claude binary missing from tarball"; ls -la package; exit 1; }
          CLAUDE_VERSION=$(node -p "require('/tmp/package/package.json').version")
          echo "[claude] bundling @anthropic-ai/claude-code-linux-arm64-musl@${CLAUDE_VERSION}"
          cp package/claude "${GITHUB_WORKSPACE}/${JNILIBS}/libclaude.so"
          chmod 755 "${GITHUB_WORKSPACE}/${JNILIBS}/libclaude.so"
          ls -lh "${GITHUB_WORKSPACE}/${JNILIBS}/libclaude.so"
          file "${GITHUB_WORKSPACE}/${JNILIBS}/libclaude.so" | head -1

      - name: Download codex-termux Android binaries (exec + TUI)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          JNILIBS="modules/terminal-emulator/android/src/main/jniLibs/arm64-v8a"
          # bug: 2026-04-27 — DioNanos/codex-termux v0.125.0-termux dropped
          # the legacy `codex-termux-android-arm64-<tag>.tar.gz` asset and
          # only ships `mmmbuto-codex-cli-termux-<ver>-termux.tgz` (npm-pack
          # format) now. We don't yet handle the new format, so walk back
          # newest-first through recent releases and use the first that
          # still has the legacy assets we know how to extract. Fallback
          # cap = 5 most recent releases.
          CODEX_TERMUX_VERSION=""
          for candidate in $(gh release list --repo DioNanos/codex-termux --limit 5 --json tagName --jq '.[].tagName'); do
            echo "[codex] probing $candidate for legacy asset pattern"
            if gh release view "$candidate" --repo DioNanos/codex-termux --json assets --jq '.assets[].name' \
                 | grep -qE "^codex-termux-android-arm64-${candidate}\.tar\.gz$"; then
              CODEX_TERMUX_VERSION="$candidate"
              echo "[codex] selected $candidate (has legacy assets)"
              break
            fi
            echo "[codex] $candidate skipped (no legacy assets)"
          done
          if [ -z "$CODEX_TERMUX_VERSION" ]; then
            echo "FATAL: none of the 5 most recent codex-termux releases have the legacy asset pattern" >&2
            echo "  Update this workflow to handle the new mmmbuto-codex-cli-termux-<ver>-termux.tgz format" >&2
            exit 1
          fi
          echo "[codex] bundling codex-termux ${CODEX_TERMUX_VERSION}"
          gh release download "${CODEX_TERMUX_VERSION}" \
            --repo DioNanos/codex-termux \
            --pattern "codex-termux-android-arm64-${CODEX_TERMUX_VERSION}.tar.gz" \
            --pattern "codex-termux-android-arm64-${CODEX_TERMUX_VERSION}.tar.gz.sha256" \
            --dir /tmp \
            --clobber
          cd /tmp
          # DioNanos/codex-termux .sha256 files contain a bare hex digest
          # (no filename suffix), so sha256sum -c rejects them with
          # "no properly formatted checksum lines found". Read and compare manually.
          EXPECTED_HASH="$(tr -d '[:space:]' < "codex-termux-android-arm64-${CODEX_TERMUX_VERSION}.tar.gz.sha256")"
          ACTUAL_HASH="$(sha256sum "codex-termux-android-arm64-${CODEX_TERMUX_VERSION}.tar.gz" | awk '{print $1}')"
          if [ "${EXPECTED_HASH}" != "${ACTUAL_HASH}" ]; then
            echo "FATAL: sha256 mismatch for codex-termux tarball" >&2
            echo "  expected: ${EXPECTED_HASH}" >&2
            echo "  actual:   ${ACTUAL_HASH}" >&2
            exit 1
          fi
          echo "[codex] sha256 OK: ${ACTUAL_HASH}"
          mv "codex-termux-android-arm64-${CODEX_TERMUX_VERSION}.tar.gz" /tmp/codex-termux.tar.gz
          cd /tmp && tar xzf codex-termux.tar.gz
          # Verify the upstream tarball still ships both binaries we depend on.
          # If DioNanos/codex-termux ever renames or drops one of these files,
          # the next green build would silently produce an APK with codex
          # broken on-device. Fail loud here instead.
          for f in /tmp/codex-exec.bin /tmp/codex.bin; do
            if [ ! -f "$f" ]; then
              echo "FATAL: expected $f in codex-termux tarball; tarball contents:" >&2
              ls -la /tmp >&2
              exit 1
            fi
          done
          # 1-shot exec binary (used by `codex exec/resume/review` subcommands)
          cp /tmp/codex-exec.bin "${GITHUB_WORKSPACE}/${JNILIBS}/libcodex_exec.so"
          chmod 755 "${GITHUB_WORKSPACE}/${JNILIBS}/libcodex_exec.so"
          # Full TUI binary (used by `codex` with no subcommand — interactive mode)
          cp /tmp/codex.bin "${GITHUB_WORKSPACE}/${JNILIBS}/libcodex_tui.so"
          chmod 755 "${GITHUB_WORKSPACE}/${JNILIBS}/libcodex_tui.so"
          ls -lh "${GITHUB_WORKSPACE}/${JNILIBS}/libcodex_exec.so" "${GITHUB_WORKSPACE}/${JNILIBS}/libcodex_tui.so"

      - name: Bundle AI CLIs (Gemini CLI + Codex JS dispatcher)
        run: |
          mkdir -p cli-bundle
          # bug #139 (2026-04-27): dropped @anthropic-ai/claude-code@2.1.112
          # from the bundle. The musl SEA at libclaude.so is the primary
          # Claude path now (claude() bash function in HomeInitializer.kt
          # prefers it over cli.js — line 1184). The bundled cli.js was
          # only reached when both runtime SEA and APK SEA failed, an
          # extremely rare path on a working device. Saves ~250-300 MB
          # APK. If a user truly hits the rare offline+SEA-broken path,
          # __shelly_bg_cli_update can pull cli.js fresh from npm on
          # next network event into ~/.shelly-cli.
          #
          # Gemini stays — pure JS, ~30 MB compressed, genuinely needed
          # for offline first-launch.
          # Codex JS dispatcher stays — small (~5 MB) and required to
          # patch into the codex-termux native binary at install time.
          npm install -g --prefix ./cli-bundle --cpu=arm64 --os=linux \
            @google/gemini-cli@latest \
            @openai/codex@latest
          # Patch clipboardy: remove Termux guard so Gemini CLI starts without Termux
          # The check may be in clipboardy hoisted to various locations or bundled in chunks
          find cli-bundle/lib -name "*.js" -exec grep -l "TERMUX_VERSION" {} \; | while read f; do
            sed -i "s|process.env.TERMUX_VERSION===void 0|false|g" "$f"
            sed -i "s|process.env.TERMUX_VERSION === undefined|false|g" "$f"
            echo "Patched TERMUX_VERSION in: $f"
          done
          # Tar them up for APK assets (LibExtractor will extract on first launch)
          cd cli-bundle/lib
          tar czf ../../modules/terminal-emulator/android/src/main/assets/cli-tools.tar.gz node_modules
          cd ../..
          ls -lh modules/terminal-emulator/android/src/main/assets/cli-tools.tar.gz

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build shelly-musl trampoline loader (bug #117)
        run: |
          JNILIBS="modules/terminal-emulator/android/src/main/jniLibs/arm64-v8a"
          SRC="modules/terminal-emulator/android/src/main/jni/shelly-musl-exec.c"
          OUT="${GITHUB_WORKSPACE}/${JNILIBS}/libshelly_musl_exec.so"
          NDK_CLANG="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang"

          test -x "${NDK_CLANG}" || { echo "NDK clang not found: ${NDK_CLANG}"; exit 1; }
          "${NDK_CLANG}" -fPIE -pie -O2 -Wall -Wextra -Werror \
            "${SRC}" -o "${OUT}"
          chmod 755 "${OUT}"
          ls -lh "${OUT}"
          file "${OUT}"

      - name: Build musl exec wrapper for Claude SEA (bug #117/#731)
        # Compile the musl-native exec wrapper (exec-wrapper-musl.c) inside
        # an Alpine arm64 container so the resulting .so depends ONLY on
        # libc.musl-aarch64.so.1. The previous Path C-bis step compiled
        # exec-wrapper.c (bionic source) under Alpine which produced a
        # binary referencing __register_atfork / __open_2 / __errno —
        # symbols musl ld-musl cannot resolve, surfaced on-device as
        # "Error relocating libexec_wrapper.so" when claude() routed the
        # bionic preload into the musl loader. This step overwrites the
        # earlier output with the correct musl-native build.
        run: |
          JNILIBS="modules/terminal-emulator/android/src/main/jniLibs/arm64-v8a"
          SRC="/work/modules/terminal-emulator/android/src/main/jni/exec-wrapper-musl.c"
          OUT="/work/${JNILIBS}/libexec_wrapper_musl.so"
          docker run --rm --platform linux/arm64 \
            -v "${GITHUB_WORKSPACE}:/work" \
            alpine:3.19 sh -euxc "
              apk add --no-progress build-base file
              cc -shared -fPIC -O2 -Wall -Wextra -Werror '${SRC}' -o '${OUT}' -ldl
              strip --strip-unneeded '${OUT}'
              chmod 755 '${OUT}'
              ls -lh '${OUT}'
              file '${OUT}'
            "

      - name: Build Shelly shell launcher
        run: |
          JNILIBS="modules/terminal-emulator/android/src/main/jniLibs/arm64-v8a"
          SRC="modules/terminal-emulator/android/src/main/jni/shelly-shell-launcher.c"
          OUT="${GITHUB_WORKSPACE}/${JNILIBS}/libshelly_shell.so"
          NDK_CLANG="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang"

          test -x "${NDK_CLANG}" || { echo "NDK clang not found: ${NDK_CLANG}"; exit 1; }
          "${NDK_CLANG}" -fPIE -pie -O2 -Wall -Wextra -Werror \
            "${SRC}" -o "${OUT}"
          chmod 755 "${OUT}"
          ls -lh "${OUT}"
          file "${OUT}"

      - name: Strip large AI runtime binaries (allowlist size reduction)
        # bug #142 follow-up (2026-04-28): the previous Tier-2 attempt
        # stripped every native library and caused an IME regression on
        # Z Fold6. Keep this pass narrow: only the three largest AI runtime
        # executables that do not participate in RN/IME/native-view loading.
        #
        # Avoid stripping libc++/Hermes/Reanimated/terminal-view/native
        # module libraries. The goal is a safe first reduction step, not a
        # maximal strip sweep.
        run: |
          JNILIBS="${GITHUB_WORKSPACE}/modules/terminal-emulator/android/src/main/jniLibs/arm64-v8a"
          TARGETS="libclaude.so libcodex_exec.so libcodex_tui.so"

          echo "=== allowlist strip: pre sizes ==="
          for f in ${TARGETS}; do
            p="${JNILIBS}/${f}"
            if [ ! -f "${p}" ]; then
              echo "FATAL: expected ${p}" >&2
              exit 1
            fi
            ls -lh "${p}"
            file "${p}"
          done

          total_saved=0
          for f in ${TARGETS}; do
            p="${JNILIBS}/${f}"
            before=$(stat -c %s "${p}")
            aarch64-linux-gnu-strip --strip-unneeded "${p}" 2>/tmp/strip-${f}.log || {
              echo "FATAL: strip failed for ${f}" >&2
              cat "/tmp/strip-${f}.log" >&2 || true
              exit 1
            }
            chmod 755 "${p}"
            after=$(stat -c %s "${p}")
            saved=$((before - after))
            total_saved=$((total_saved + saved))
            echo "[allowlist-strip] ${f}: ${before} -> ${after} bytes (saved ${saved})"
            if ! file "${p}" | grep -qE 'ELF.*64-bit'; then
              echo "FATAL: ${f} is not a valid 64-bit ELF after strip" >&2
              file "${p}" >&2 || true
              exit 1
            fi
            readelf -h "${p}" | grep -E 'Type|Machine'
          done
          echo "[allowlist-strip] total saved ${total_saved} bytes"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease -x lintVitalAnalyzeRelease
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"'

      - name: Report APK size
        run: |
          set -euo pipefail
          shopt -s nullglob
          apks=(android/app/build/outputs/apk/release/*.apk)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "FATAL: release APK not found" >&2
            exit 1
          fi
          for apk in "${apks[@]}"; do
            bytes=$(stat -c %s "${apk}")
            mib=$(awk -v b="${bytes}" 'BEGIN { printf "%.1f", b / 1024 / 1024 }')
            echo "[apk-size] ${apk}: ${bytes} bytes (${mib} MiB)"
            ls -lh "${apk}"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shelly-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Publish EAS Update (OTA)
        run: eas update --platform android --branch preview --message "${MSG:-manual build}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          MSG: ${{ github.event.head_commit.message }}
