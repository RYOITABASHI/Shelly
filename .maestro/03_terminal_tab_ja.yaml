appId: dev.shelly.terminal
---
# ネイティブPTY回帰スモークテスト。
# 初回セットアップ完了後、ターミナルペインが表示されている状態で実行する。

- launchApp

- assertVisible:
    id: "native-terminal-view"
  timeout: 20000

- tapOn:
    id: "native-terminal-view"

- inputText: "bash -c 'echo SHELLY_PTY_SMOKE_OK'"
- pressKey: Enter

- assertVisible:
    text: "SHELLY_PTY_SMOKE_OK"
  timeout: 10000

- inputText: "exit"
- pressKey: Enter
