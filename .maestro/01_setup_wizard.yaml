appId: dev.shelly.terminal
---
# Setup flow entry smoke test.
# The setup UI now runs inside Shelly's native PTY-backed terminal.

- launchApp

- assertVisible:
    id: "native-terminal-view"
  timeout: 20000

- tapOn:
    id: "native-terminal-view"

- inputText: "shelly setup"
- pressKey: Enter

- assertVisible:
    text: "Welcome to Shelly"
  timeout: 10000
  optional: true

- assertVisible:
    text: "Install AI Coding Agents"
  timeout: 10000
  optional: true
