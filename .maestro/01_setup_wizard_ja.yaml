appId: dev.shelly.terminal
---
# セットアップフロー起動スモークテスト。
# セットアップUIはネイティブPTY上のターミナル内で動作する。

- launchApp

- assertVisible:
    id: "native-terminal-view"
  timeout: 20000

- tapOn:
    id: "native-terminal-view"

- inputText: "shelly setup"
- pressKey: Enter

- assertVisible:
    text: "Shellyへようこそ"
  timeout: 10000
  optional: true

- assertVisible:
    text: "AIコーディングエージェントをインストール"
  timeout: 10000
  optional: true
