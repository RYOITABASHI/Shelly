appId: dev.shelly.terminal
---
# セットアップフロー起動スモークテスト（スクリーンショット付き）。

- launchApp
- takeScreenshot: 01_launch

- assertVisible:
    id: "native-terminal-view"
  timeout: 20000
- takeScreenshot: 02_native_terminal

- tapOn:
    id: "native-terminal-view"
- inputText: "shelly setup"
- pressKey: Enter
- takeScreenshot: 03_setup_command_sent

- assertVisible:
    text: "Shellyへようこそ"
  timeout: 10000
  optional: true
- takeScreenshot: 04_setup_flow
