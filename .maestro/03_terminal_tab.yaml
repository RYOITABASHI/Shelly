appId: dev.shelly.terminal
---
# Native PTY regression smoke test.
# Assumes the first-run setup has already completed and the terminal pane is visible.

- launchApp

- assertVisible:
    id: "native-terminal-view"
  timeout: 20000

- tapOn:
    id: "native-terminal-view"

- inputText: "bash -c 'echo SHELLY_PTY_SMOKE_OK'"
- pressKey: Enter

- assertVisible:
    text: "SHELLY_PTY_SMOKE_OK"
  timeout: 10000

- inputText: "exit"
- pressKey: Enter
